<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임 · 나의 프로젝트 작업실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<nav class="topnav pixel">
    <a href="index.html">홈</a>
    <a href="games.html" class="active">게임</a>
    <a href="works.html">작업물</a>
    <a href="etc.html">기타</a>
</nav>

<header class="hero">
    <div class="eyebrow pixel">GAMES</div>
    <h1>직접 만든 <span>게임들</span></h1>
    <p>클릭하면 바로 플레이할 수 있어요.</p>
    <div class="hero-rule"></div>
</header>

<main>
    <div class="grid">

        <!-- 새 게임을 추가하려면 이 블록을 복사해서
             href, cart-icon, 제목, 설명만 바꿔주세요. -->
        <a class="cart playable" href="games/dungeon-rpg/index.html">
            <span class="cart-tag playable pixel">PLAYABLE</span>
            <div class="cart-icon">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#e8b93f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="5" x2="9" y2="15"/>
                    <line x1="7" y1="17" x2="11" y2="13"/>
                    <line x1="9" y1="15" x2="6" y2="18"/>
                    <circle cx="5" cy="19" r="1" fill="#e8b93f"/>
                </svg>
            </div>
            <h3>던전 RPG</h3>
            <p>레벨업하고 스킬트리를 키워가며 던전을 내려가는 픽셀 로그라이크.</p>
            <div class="cart-play pixel">▶ PLAY</div>
        </a>

        <div class="cart disabled">
            <span class="cart-tag wip pixel">제작중</span>
            <div class="cart-icon">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#d9642f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="8"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="12" x2="15" y2="14"/>
                </svg>
            </div>
            <h3>다음 작품</h3>
            <p>지금 구상 중인 프로젝트예요. 완성되면 여기 채워질 예정.</p>
        </div>

        <div class="cart empty">
            <div class="cart-icon" style="justify-content:center; width:100%;">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#8f8879" stroke-width="1.6" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </div>
            <div class="pixel" style="font-size:10px; letter-spacing:0.05em;">빈 슬롯<br>다음에 만들 걸 여기에</div>
        </div>

    </div>
</main>

<footer>
    made with care · updated as things get made
</footer>

</body>
</html>
