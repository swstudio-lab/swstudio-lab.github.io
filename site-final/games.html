<style>
    .pagination{ display:flex; align-items:center; justify-content:center; gap:14px; margin:20px 0 8px; }
    .pagination button{
        background:var(--surface); border:1px solid var(--border-lit); color:var(--gold);
        border-radius:6px; padding:7px 14px; font-size:12px; cursor:pointer; font-family:inherit;
    }
    .pagination button:disabled{ opacity:0.3; cursor:not-allowed; }
    .pagination .pg-label{ font-size:12px; color:var(--muted); }
    .section-loading{ text-align:center; color:var(--muted); font-size:12.5px; padding:20px; }

    /* 모드 선택 카드 */
    .reveal{ opacity:0; transform:translateY(12px); animation:revealIn .5s ease forwards; }
    @keyframes revealIn{ to{ opacity:1; transform:translateY(0); } }
    .mode-picker{
        display:grid; grid-template-columns:1fr 1fr; gap:20px;
        max-width:640px; margin:0 auto;
    }
    .mode-card{
        background:linear-gradient(180deg, var(--surface2), var(--surface));
        border:1px solid var(--border); border-radius:14px; padding:32px 24px;
        text-align:center; cursor:pointer; color:var(--text); font-family:inherit;
        transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .mode-card:hover{
        transform:translateY(-4px);
        border-color:var(--border-lit);
        box-shadow:0 12px 28px -10px rgba(232,185,63,0.28);
    }
    .mode-card .mode-icon{ display:flex; justify-content:center; margin-bottom:16px; }
    .mode-card h3{ margin:0 0 6px; font-size:16px; }
    .mode-card .mode-count{ font-size:11.5px; color:var(--muted); }

    /* 선택 후 결과 화면 */
    .mode-result{ display:none; }
    .mode-tabs{
        display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:32px; flex-wrap:wrap;
    }
    .mode-tab{
        background:var(--surface); border:1px solid var(--border); color:var(--muted);
        border-radius:20px; padding:9px 18px; font-size:12.5px; cursor:pointer; font-family:inherit;
        display:flex; align-items:center; gap:8px;
        transition:border-color .15s ease, color .15s ease, background .15s ease;
    }
    .mode-tab:hover{ color:var(--text); }
    .mode-tab.active{ border-color:var(--border-lit); color:var(--gold); background:rgba(232,185,63,0.1); }
    .mode-back{
        background:none; border:none; color:var(--muted); font-size:12px; cursor:pointer;
        font-family:inherit; padding:9px 6px; text-decoration:underline; text-underline-offset:3px;
    }
    .mode-back:hover{ color:var(--text); }
</style>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyB0LRiIpNwdcCkS4Y5Dz4pP9zcLoadO2Xk",
    authDomain: "taskflow-7cb3b.firebaseapp.com",
    projectId: "taskflow-7cb3b",
    storageBucket: "taskflow-7cb3b.firebasestorage.app",
    messagingSenderId: "811223035419",
    appId: "1:811223035419:web:08b972916827147bc2d2be"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const col = db.collection('siteItems');
const PAGE_SIZE = 6;

const ICON_PATHS = {
    sword: '<line x1="19" y1="5" x2="9" y2="15"/><line x1="7" y1="17" x2="11" y2="13"/><line x1="9" y1="15" x2="6" y2="18"/><circle cx="5" cy="19" r="1" fill="C"/>',
    grid: '<rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/><path d="M6 6l2 2M18 6l-2 2" stroke-width="1.4"/>',
    horse: '<path d="M4 18c2-6 5-10 9-10 3 0 4 2 4 4 0 3-2 4-5 4"/><circle cx="17" cy="8" r="1" fill="C"/><path d="M8 18h9"/><path d="M6 15l-2 3M20 15l2 3"/>',
    wrench: '<path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 0 0 5.4-5.4l-2.5 2.5-2-2z"/>',
    table: '<rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="10" x2="9" y2="20"/><line x1="15" y1="10" x2="15" y2="20"/>',
    calendar: '<rect x="4" y="5" width="16" height="15" rx="2"/><line x1="4" y1="10" x2="20" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/>',
    card: '<rect x="4" y="3" width="10" height="16" rx="2" transform="rotate(-8 9 11)"/><rect x="11" y="4" width="10" height="16" rx="2" transform="rotate(8 16 12)"/><circle cx="16" cy="11" r="1.4" fill="C"/>',
    clock: '<circle cx="12" cy="12" r="8"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="12" x2="15" y2="14"/>',
    box: '<rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 9h16M9 9v11"/>',
    star: '<path d="M12 3l2.6 5.9L21 9.6l-4.8 4.2 1.4 6.6L12 17l-5.6 3.4 1.4-6.6L3 9.6l6.4-.7z"/>',
    sparkle: '<path d="M12 4l1.5 5.5L19 11l-5.5 1.5L12 18l-1.5-5.5L5 11l5.5-1.5L12 4z"/>'
};
function iconSvg(key, color, size){
    size = size || 30;
    const inner = (ICON_PATHS[key] || ICON_PATHS.box).replace(/C/g, color);
    return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
}
function escHtml(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let currentMode = null; // 'solo' | 'multi' | null(선택 전)
let pageByMode = { solo: 1, multi: 1 };
let latestItems = [];
let dataLoaded = false;

function cardHtml(it){
    const tagLabel = it.tag === 'wip' ? '제작중' : 'PLAYABLE';
    const tagClass = it.tag === 'wip' ? 'wip' : 'playable';
    const color = it.tag === 'wip' ? '#d9642f' : '#e8b93f';
    if (it.tag === 'wip' || !it.href) {
        return `
        <div class="cart disabled">
            <span class="cart-tag ${tagClass} pixel">${tagLabel}</span>
            <div class="cart-icon">${iconSvg(it.icon, color)}</div>
            <h3>${escHtml(it.title)}</h3>
            <p>${escHtml(it.desc)}</p>
        </div>`;
    }
    return `
        <a class="cart playable" href="${escHtml(it.href)}">
            <span class="cart-tag ${tagClass} pixel">${tagLabel}</span>
            <div class="cart-icon">${iconSvg(it.icon, color)}</div>
            <h3>${escHtml(it.title)}</h3>
            <p>${escHtml(it.desc)}</p>
            <div class="cart-play pixel">▶ PLAY</div>
        </a>`;
}
const EMPTY_SLOT_HTML = `
    <div class="cart empty">
        <div class="cart-icon" style="justify-content:center; width:100%;">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#8f8879" stroke-width="1.6" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        </div>
        <div class="pixel" style="font-size:10px; letter-spacing:0.05em;">빈 슬롯<br>다음에 만들 걸 여기에</div>
    </div>`;

function itemsFor(mode, allItems){
    return allItems.filter(it => it.category==='games' && it.subcategory===mode && it.published).sort((a,b)=>(a.order||0)-(b.order||0));
}

function renderGrid(){
    if (!currentMode) return;
    if (!dataLoaded) return; // 아직 데이터 안 왔으면 "불러오는 중..." 유지
    const items = itemsFor(currentMode, latestItems);
    const gridEl = document.getElementById('items-grid');
    const pagEl = document.getElementById('items-pagination');
    const totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
    const page = Math.min(pageByMode[currentMode], totalPages);
    pageByMode[currentMode] = page;
    const start = (page - 1) * PAGE_SIZE;
    const pageItems = items.slice(start, start + PAGE_SIZE);

    let html = pageItems.map(cardHtml).join('');
    if (page === totalPages && pageItems.length < PAGE_SIZE) html += EMPTY_SLOT_HTML;
    gridEl.innerHTML = html || EMPTY_SLOT_HTML;

    if (totalPages > 1) {
        pagEl.style.display = 'flex';
        pagEl.innerHTML = `
            <button id="pg-prev" ${page<=1?'disabled':''}>← 이전</button>
            <span class="pg-label">${page} / ${totalPages}</span>
            <button id="pg-next" ${page>=totalPages?'disabled':''}>다음 →</button>
        `;
        document.getElementById('pg-prev').addEventListener('click', () => { pageByMode[currentMode]--; renderGrid(); });
        document.getElementById('pg-next').addEventListener('click', () => { pageByMode[currentMode]++; renderGrid(); });
    } else {
        pagEl.style.display = 'none';
    }
}

function selectMode(mode){
    currentMode = mode;
    document.getElementById('mode-picker').style.display = 'none';
    document.getElementById('mode-result').style.display = 'block';
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
    renderGrid();
    window.scrollTo({ top: document.querySelector('header.hero').offsetHeight, behavior:'smooth' });
}

document.getElementById('mode-picker').addEventListener('click', e => {
    const card = e.target.closest('.mode-card');
    if (!card) return;
    selectMode(card.dataset.mode);
});
document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => selectMode(tab.dataset.mode));
});
document.getElementById('mode-back').addEventListener('click', () => {
    currentMode = null;
    document.getElementById('mode-result').style.display = 'none';
    document.getElementById('mode-picker').style.display = 'grid';
});

col.onSnapshot(snap => {
    latestItems = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
    dataLoaded = true;
    const soloN = itemsFor('solo', latestItems).length;
    const multiN = itemsFor('multi', latestItems).length;
    document.getElementById('solo-count').textContent = `${soloN}개의 게임`;
    document.getElementById('multi-count').textContent = `${multiN}개의 게임`;
    if (currentMode) renderGrid();
});

/* nav 드롭다운(또는 외부 링크)에서 ?mode=solo / ?mode=multi 로 바로 들어온 경우 */
const initialMode = new URLSearchParams(location.search).get('mode');
if (initialMode === 'solo' || initialMode === 'multi') {
    selectMode(initialMode);
}
</script>
