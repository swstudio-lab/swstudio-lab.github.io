<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 프로젝트 작업실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
    .cat-grid{
        display:grid;
        grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
        gap:20px;
        max-width:840px;
        margin:0 auto;
    }
    .cat-card{
        position:relative;
        background:linear-gradient(180deg, var(--surface2), var(--surface));
        border:1px solid var(--border);
        border-radius:12px;
        padding:28px 22px;
        text-decoration:none;
        color:var(--text);
        text-align:center;
        transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .cat-card:hover{
        transform:translateY(-4px);
        border-color:var(--border-lit);
        box-shadow:0 10px 28px -8px rgba(232,185,63,0.28), 0 0 0 1px rgba(232,185,63,0.12);
    }
    .cat-icon{ font-size:32px; margin-bottom:14px; }
    .cat-card h3{ margin:0 0 8px; font-size:16px; font-weight:700; }
    .cat-card p{ margin:0; font-size:12.5px; color:var(--muted); line-height:1.55; }
</style>
</head>
<body>

<nav class="topnav pixel">
    <a href="index.html" class="active">홈</a>
    <a href="games.html">게임</a>
    <a href="works.html">작업물</a>
    <a href="etc.html">기타</a>
</nav>

<header class="hero">
    <div class="eyebrow pixel">PERSONAL&nbsp;PROJECTS</div>
    <h1>나의 프로젝트 <span>작업실</span></h1>
    <p>취미로 만든 게임, 작업물, 그리고 이것저것 실험한 결과물들을 여기에 하나씩 쌓아갑니다.</p>
    <div class="hero-rule"></div>
</header>

<main>
    <div class="shelf-label pixel">둘러보기</div>
    <div class="cat-grid">
        <a class="cat-card" href="games.html">
            <div class="cat-icon">⚔️</div>
            <h3>게임</h3>
            <p>직접 만든 플레이 가능한 게임들</p>
        </a>
        <a class="cat-card" href="works.html">
            <div class="cat-icon">🛠️</div>
            <h3>작업물</h3>
            <p>앱, 디자인, 도구 같은 완성된 결과물</p>
        </a>
        <a class="cat-card" href="etc.html">
            <div class="cat-icon">📦</div>
            <h3>기타</h3>
            <p>분류하기 애매한 이것저것</p>
        </a>
    </div>
</main>

<footer>
    made with care · updated as things get made
</footer>

</body>
</html>
