<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>함수식 마법사 · 나의 프로젝트 작업실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/style.css">
<style>
    .wrap{ max-width:960px; margin:0 auto; padding:0 20px 100px; }
    .tool-header{ max-width:960px; margin:0 auto; padding:56px 20px 24px; text-align:center; }
    .tool-header .eyebrow{ font-size:11px; letter-spacing:0.18em; color:var(--gold); margin-bottom:14px; }
    .tool-header h1{ font-size:clamp(24px,5vw,34px); font-weight:900; margin:0 0 10px; }
    .tool-header p{ color:var(--muted); font-size:13.5px; max-width:520px; margin:0 auto; }

    .platform-switch{ display:flex; gap:8px; justify-content:center; margin-bottom:24px; }
    .plat-btn{
        background:var(--surface); border:1px solid var(--border); color:var(--muted);
        border-radius:20px; padding:8px 18px; font-size:12.5px; cursor:pointer; font-family:inherit;
        transition:border-color .15s ease, color .15s ease, background .15s ease;
    }
    .plat-btn.active{ border-color:var(--border-lit); color:var(--gold); background:rgba(232,185,63,0.1); }

    .grid2{ display:grid; grid-template-columns:1.3fr 1fr; gap:20px; }
    @media (max-width:760px){ .grid2{ grid-template-columns:1fr; } }

    .panel{
        background:linear-gradient(180deg, var(--surface2), var(--surface));
        border:1px solid var(--border); border-radius:12px; padding:20px;
    }
    .panel h3{ margin:0 0 16px; font-size:14px; }

    select, input[type="text"], input[type="number"], textarea{
        width:100%; box-sizing:border-box; background:var(--surface); border:1px solid var(--border);
        color:var(--text); border-radius:6px; padding:9px 10px; font-size:13px; font-family:inherit;
        margin-bottom:12px;
    }
    select:focus, input:focus, textarea:focus{ outline:none; border-color:var(--border-lit); }
    label.f-label{ font-size:11.5px; color:var(--muted); display:block; margin-bottom:5px; }
    .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .row3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

    .formula-box{
        background:var(--bg); border:1px solid var(--border-lit); border-radius:8px;
        padding:12px 14px; display:flex; align-items:flex-start; gap:10px; margin-bottom:10px;
    }
    .formula-box code{ flex:1; font-size:13.5px; color:var(--gold); word-break:break-all; line-height:1.6; }
    .copy-btn{
        background:var(--surface2); border:1px solid var(--border); color:var(--muted);
        border-radius:6px; padding:6px 10px; font-size:11px; cursor:pointer; flex:0 0 auto; font-family:inherit;
    }
    .copy-btn:hover{ color:var(--gold); border-color:var(--border-lit); }
    .explain-box{ font-size:12.5px; color:var(--muted); line-height:1.6; }

    .paste-zone{
        border:1.5px dashed var(--border-lit); border-radius:12px; padding:24px; text-align:center;
        min-height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center;
        cursor:text; position:relative;
    }
    .paste-zone.has-img{ padding:8px; }
    .paste-zone img{ max-width:100%; max-height:340px; border-radius:8px; }
    .paste-zone .pz-icon{ font-size:28px; color:var(--muted); margin-bottom:10px; }
    .paste-zone .pz-hint{ font-size:12.5px; color:var(--muted); }
    .paste-zone .pz-note{ font-size:11px; color:#8a7f6a; margin-top:6px; }
    .clear-img-btn{
        position:absolute; top:8px; right:8px; background:var(--surface2); border:1px solid var(--border);
        color:var(--muted); border-radius:6px; padding:4px 8px; font-size:11px; cursor:pointer;
    }

    .tier-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:8px; }
    .note{ font-size:11px; color:var(--muted); margin-top:4px; }
</style>
</head>
<body>

<nav class="topnav pixel">
    <a href="../../index.html">홈</a>
    <a href="../../games.html">게임</a>
    <a href="../../works.html" class="active">작업물</a>
    <a href="../../etc.html">기타</a>
</nav>

<header class="tool-header">
    <div class="eyebrow pixel">FORMULA WIZARD</div>
    <h1>함수식 마법사</h1>
    <p>함수 이름이 아니라 "하고 싶은 일"을 고르면, 완성된 수식을 조립해드려요. 실제 데이터는 입력하지 않아도 돼요 — 셀 범위와 조건만 있으면 충분해요.</p>
</header>

<div class="wrap">
    <div class="platform-switch" id="platform-switch"></div>

    <div class="grid2">
        <div class="panel">
            <h3>🧩 하고 싶은 일</h3>
            <select id="scenario-select"></select>
            <div id="scenario-form"></div>

            <h3 style="margin-top:20px;">✅ 완성된 수식</h3>
            <div class="formula-box">
                <code id="formula-out">조건을 입력하면 여기에 수식이 완성돼요</code>
                <button class="copy-btn" id="copy-btn">복사</button>
            </div>
            <div class="explain-box" id="explain-out"></div>
        </div>

        <div class="panel">
            <h3>📋 참고용 스크린샷 (선택)</h3>
            <div class="paste-zone" id="paste-zone" tabindex="0">
                <div class="pz-icon">🖼️</div>
                <div class="pz-hint">여기를 클릭하고 Ctrl+V로 붙여넣기</div>
                <div class="pz-note">이 이미지는 분석되지 않아요. 옆에서 셀 위치 확인하는 용도예요.</div>
            </div>
        </div>
    </div>
</div>

<div id="toast" style="position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface2); border:1px solid var(--border-lit); color:var(--gold); padding:10px 18px; border-radius:8px; font-size:12.5px; opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease;"></div>

<script>
function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
    clearTimeout(toast._t);
    toast._t = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; }, 1600);
}
let platform = 'excel';
function v(id){ const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function setFormula(f, explain){
    document.getElementById('formula-out').textContent = f;
    document.getElementById('explain-out').textContent = explain || '';
}

const SCENARIOS = {
    sumif: {
        label: '조건에 맞는 합계/평균/개수',
        form: `
            <label class="f-label">구하고 싶은 값</label>
            <select id="s_type" onchange="toggleSumRange(); recompute()">
                <option value="sum">합계</option>
                <option value="avg">평균</option>
                <option value="count">개수</option>
            </select>
            <label class="f-label">조건 1 — 범위 / 조건값</label>
            <div class="row2"><input id="s_r1" placeholder="예: B2:B100" oninput="recompute()"><input id="s_c1" placeholder="예: 완료" oninput="recompute()"></div>
            <label class="f-label">조건 2 (선택)</label>
            <div class="row2"><input id="s_r2" placeholder="예: C2:C100" oninput="recompute()"><input id="s_c2" placeholder="예: 서울" oninput="recompute()"></div>
            <label class="f-label" id="s_sumlabel">합계/평균 낼 범위</label>
            <input id="s_sr" placeholder="예: D2:D100" oninput="recompute()">
        `,
        onShow(){ toggleSumRange(); },
        build(){
            const type = v('s_type');
            const conds = [[v('s_r1'), v('s_c1')], [v('s_r2'), v('s_c2')]].filter(c => c[0] && c[1]);
            const sr = v('s_sr');
            if (conds.length === 0) return { f: '조건을 최소 1개 입력해주세요', e: '' };
            if (type === 'count') {
                const f = conds.length === 1
                    ? `=COUNTIF(${conds[0][0]},"${conds[0][1]}")`
                    : `=COUNTIFS(${conds.map(c=>`${c[0]},"${c[1]}"`).join(',')})`;
                return { f, e: '조건에 맞는 행의 개수를 세요.' };
            }
            if (!sr) return { f: '합계/평균 낼 범위도 입력해주세요', e: '' };
            const fn = type === 'sum' ? 'SUMIF' : 'AVERAGEIF';
            const fnS = type === 'sum' ? 'SUMIFS' : 'AVERAGEIFS';
            const f = conds.length === 1
                ? `=${fn}(${conds[0][0]},"${conds[0][1]}",${sr})`
                : `=${fnS}(${sr},${conds.map(c=>`${c[0]},"${c[1]}"`).join(',')})`;
            return { f, e: `조건을 만족하는 행들의 값을 ${type==='sum'?'더해요':'평균 내요'}.` };
        }
    },
    vlookup: {
        label: '다른 표에서 값 가져오기',
        form: `
            <label class="f-label">찾을 값</label>
            <input id="v_val" placeholder="예: A2" oninput="recompute()">
            <label class="f-label">찾아볼 표 범위 (첫 열에 찾을 값이 있어야 해요)</label>
            <input id="v_table" placeholder="예: Sheet2!A:D" oninput="recompute()">
            <label class="f-label">가져올 열 번호 (표의 몇 번째 열인지)</label>
            <input id="v_col" type="number" placeholder="예: 3" oninput="recompute()">
            <label class="f-label">못 찾았을 때 보여줄 값 (선택)</label>
            <input id="v_fallback" placeholder="예: 없음" oninput="recompute()">
        `,
        build(){
            const val = v('v_val'), table = v('v_table'), col = v('v_col'), fb = v('v_fallback');
            if (!val || !table || !col) return { f: '찾을 값, 표 범위, 열 번호를 입력해주세요', e: '' };
            let base = `VLOOKUP(${val},${table},${col},FALSE)`;
            let f = fb ? `=IFERROR(${base},"${fb}")` : `=${base}`;
            return { f, e: fb ? '표에서 값을 찾아오고, 못 찾으면 지정한 값을 보여줘요.' : '표의 첫 열에서 찾을 값을 찾아 지정한 열의 값을 가져와요.' };
        }
    },
    rank: {
        label: '순위 매기기',
        form: `
            <label class="f-label">순위를 매길 셀</label>
            <input id="rk_cell" placeholder="예: B2" oninput="recompute()">
            <label class="f-label">전체 범위</label>
            <input id="rk_range" placeholder="예: B2:B100" oninput="recompute()">
            <label class="f-label">순서</label>
            <select id="rk_order" onchange="recompute()">
                <option value="0">큰 값이 1등 (내림차순)</option>
                <option value="1">작은 값이 1등 (오름차순)</option>
            </select>
        `,
        build(){
            const cell = v('rk_cell'), range = v('rk_range'), order = v('rk_order');
            if (!cell || !range) return { f: '순위 매길 셀과 범위를 입력해주세요', e: '' };
            const fn = platform === 'excel' ? 'RANK.EQ' : 'RANK';
            return { f: `=${fn}(${cell},${range},${order})`, e: '해당 값이 범위 안에서 몇 등인지 계산해요.' };
        }
    },
    datecalc: {
        label: '날짜 계산 (근무일수/나이/D-day)',
        form: `
            <label class="f-label">계산 종류</label>
            <select id="d_type" onchange="toggleDateForm(); recompute()">
                <option value="workdays">두 날짜 사이 근무일수 (주말 제외)</option>
                <option value="age">만 나이 계산</option>
                <option value="dday">디데이 (목표일까지 며칠)</option>
            </select>
            <div id="d_form"></div>
        `,
        onShow(){ toggleDateForm(); },
        build(){
            const type = v('d_type');
            if (type === 'workdays') {
                const s = v('d_start'), e = v('d_end');
                if (!s || !e) return { f: '시작일과 종료일을 입력해주세요', e: '' };
                return { f: `=NETWORKDAYS(${s},${e})`, e: '주말을 제외한 두 날짜 사이의 근무일수를 계산해요.' };
            }
            if (type === 'age') {
                const b = v('d_birth');
                if (!b) return { f: '생년월일 셀을 입력해주세요', e: '' };
                return { f: `=DATEDIF(${b},TODAY(),"y")`, e: '생년월일을 기준으로 만 나이를 계산해요.' };
            }
            const t = v('d_target');
            if (!t) return { f: '목표 날짜 셀을 입력해주세요', e: '' };
            return { f: `=${t}-TODAY()`, e: '오늘부터 목표일까지 남은 일수를 계산해요.' };
        }
    },
    duplicate: {
        label: '중복값 찾기',
        form: `
            <label class="f-label">확인할 셀</label>
            <input id="dp_cell" placeholder="예: A2" oninput="recompute()">
            <label class="f-label">전체 범위</label>
            <input id="dp_range" placeholder="예: $A$2:$A$100" oninput="recompute()">
        `,
        build(){
            const cell = v('dp_cell'), range = v('dp_range');
            if (!cell || !range) return { f: '확인할 셀과 전체 범위를 입력해주세요', e: '' };
            return { f: `=IF(COUNTIF(${range},${cell})>1,"중복","")`, e: '같은 값이 범위 안에 2번 이상 있으면 "중복"이라고 표시해요.' };
        }
    },
    iftiers: {
        label: '조건별로 다른 값 표시하기',
        form: `
            <label class="f-label">기준 셀</label>
            <input id="if_cell" placeholder="예: B2" oninput="recompute()">
            <label class="f-label">조건 1 (예: >=90) / 결과값</label>
            <div class="tier-row"><input id="if_o1" placeholder=">=90" oninput="recompute()"><input id="if_r1" placeholder="A" oninput="recompute()"></div>
            <label class="f-label">조건 2 / 결과값</label>
            <div class="tier-row"><input id="if_o2" placeholder=">=80" oninput="recompute()"><input id="if_r2" placeholder="B" oninput="recompute()"></div>
            <label class="f-label">조건 3 / 결과값</label>
            <div class="tier-row"><input id="if_o3" placeholder=">=70" oninput="recompute()"><input id="if_r3" placeholder="C" oninput="recompute()"></div>
            <label class="f-label">모두 해당 안 될 때</label>
            <input id="if_else" placeholder="F" oninput="recompute()">
        `,
        build(){
            const cell = v('if_cell');
            const tiers = [[v('if_o1'), v('if_r1')], [v('if_o2'), v('if_r2')], [v('if_o3'), v('if_r3')]].filter(t => t[0] && t[1]);
            const elseV = v('if_else') || '""';
            if (!cell || tiers.length === 0) return { f: '기준 셀과 조건을 최소 1개 입력해주세요', e: '' };
            const parts = tiers.map(t => `${cell}${t[0]},"${t[1]}"`);
            const f = `=IFS(${parts.join(',')},TRUE,"${elseV.replace(/"/g,'')}")`;
            return { f, e: '위에서부터 순서대로 조건을 확인해서, 처음 맞는 조건의 결과값을 보여줘요.' };
        }
    },
    explain: {
        label: '기존 수식 설명해주기',
        form: `
            <label class="f-label">수식을 붙여넣어주세요</label>
            <textarea id="ex_formula" rows="3" placeholder="예: =IFERROR(VLOOKUP(A2,Sheet2!A:C,3,FALSE),&quot;없음&quot;)" oninput="recompute()"></textarea>
            <div class="note">완벽한 해석기는 아니고, 많이 쓰는 함수들을 알아보고 설명해드려요.</div>
        `,
        build(){
            const s = v('ex_formula');
            if (!s) return { f: '', e: '설명할 수식을 붙여넣어주세요' };
            const known = [
                [/VLOOKUP/i, 'VLOOKUP: 표의 첫 열에서 값을 찾아 다른 열의 값을 가져와요.'],
                [/IFERROR/i, 'IFERROR: 앞의 수식이 오류가 나면, 지정한 값을 대신 보여줘요.'],
                [/SUMIFS/i, 'SUMIFS: 여러 조건을 모두 만족하는 값들을 더해요.'],
                [/SUMIF/i, 'SUMIF: 조건을 만족하는 값들을 더해요.'],
                [/COUNTIFS/i, 'COUNTIFS: 여러 조건을 모두 만족하는 행의 개수를 세요.'],
                [/COUNTIF/i, 'COUNTIF: 조건을 만족하는 행의 개수를 세요.'],
                [/AVERAGEIFS/i, 'AVERAGEIFS: 여러 조건을 만족하는 값들의 평균을 내요.'],
                [/AVERAGEIF/i, 'AVERAGEIF: 조건을 만족하는 값들의 평균을 내요.'],
                [/RANK/i, 'RANK: 범위 안에서 몇 등인지 순위를 매겨요.'],
                [/DATEDIF/i, 'DATEDIF: 두 날짜 사이의 년/월/일 차이를 계산해요.'],
                [/NETWORKDAYS/i, 'NETWORKDAYS: 주말을 제외한 두 날짜 사이 근무일수를 계산해요.'],
                [/TEXTJOIN/i, 'TEXTJOIN: 여러 셀의 텍스트를 구분자로 이어붙여요.'],
                [/IFS\(/i, 'IFS: 여러 조건을 순서대로 확인해서 처음 맞는 조건의 결과를 보여줘요.'],
                [/\bIF\(/i, 'IF: 조건이 맞으면 A, 아니면 B를 보여줘요.'],
                [/TRIM/i, 'TRIM: 불필요한 공백을 정리해요.'],
                [/LEFT\(/i, 'LEFT: 텍스트의 왼쪽에서 몇 글자를 잘라와요.'],
                [/RIGHT\(/i, 'RIGHT: 텍스트의 오른쪽에서 몇 글자를 잘라와요.'],
                [/MID\(/i, 'MID: 텍스트의 중간에서 몇 글자를 잘라와요.'],
                [/MAXIFS/i, 'MAXIFS: 조건을 만족하는 값들 중 가장 큰 값을 찾아요.'],
                [/MINIFS/i, 'MINIFS: 조건을 만족하는 값들 중 가장 작은 값을 찾아요.'],
                [/SEARCH\(/i, 'SEARCH: 텍스트 안에 특정 단어가 있는지 찾아요.']
            ];
            const found = known.filter(k => k[0].test(s)).map(k => '· ' + k[1]);
            if (found.length === 0) return { f: '', e: '알고 있는 함수 패턴을 찾지 못했어요. 조금 더 흔한 함수 조합으로 다시 시도해보세요.' };
            return { f: '', e: found.join('\n') };
        }
    },
    texttools: {
        label: '텍스트 합치기/자르기',
        form: `
            <label class="f-label">종류</label>
            <select id="t_type" onchange="toggleTextForm(); recompute()">
                <option value="join">여러 셀 합치기</option>
                <option value="left">왼쪽에서 N글자 자르기</option>
                <option value="right">오른쪽에서 N글자 자르기</option>
                <option value="mid">중간에서 N글자 자르기</option>
            </select>
            <div id="t_form"></div>
        `,
        onShow(){ toggleTextForm(); },
        build(){
            const type = v('t_type');
            if (type === 'join') {
                const cells = v('t_cells'), sep = v('t_sep') || ' ';
                if (!cells) return { f: '합칠 셀들을 입력해주세요', e: '' };
                const list = cells.split(',').map(c=>c.trim()).filter(Boolean);
                return { f: `=TEXTJOIN("${sep}",TRUE,${list.join(',')})`, e: '여러 셀의 내용을 구분자로 이어 붙여요.' };
            }
            const cell = v('t_cell'), n = v('t_n');
            if (!cell || !n) return { f: '셀과 글자 수를 입력해주세요', e: '' };
            if (type === 'left') return { f: `=LEFT(${cell},${n})`, e: '왼쪽에서부터 지정한 글자 수만큼 잘라와요.' };
            if (type === 'right') return { f: `=RIGHT(${cell},${n})`, e: '오른쪽에서부터 지정한 글자 수만큼 잘라와요.' };
            const start = v('t_start') || '1';
            return { f: `=MID(${cell},${start},${n})`, e: '지정한 위치부터 글자 수만큼 잘라와요.' };
        }
    },
    cleandata: {
        label: '데이터 정리 (공백/이상한 문자 제거)',
        form: `
            <label class="f-label">정리할 셀</label>
            <input id="cl_cell" placeholder="예: A2" oninput="recompute()">
        `,
        build(){
            const cell = v('cl_cell');
            if (!cell) return { f: '정리할 셀을 입력해주세요', e: '' };
            return { f: `=TRIM(CLEAN(${cell}))`, e: '불필요한 공백과 눈에 안 보이는 이상한 문자를 제거해요.' };
        }
    },
    maxminif: {
        label: '조건부 최댓값/최솟값',
        form: `
            <label class="f-label">종류</label>
            <select id="m_type" onchange="recompute()">
                <option value="max">최댓값</option>
                <option value="min">최솟값</option>
            </select>
            <label class="f-label">조건 범위 / 조건값</label>
            <div class="row2"><input id="m_range" placeholder="예: B2:B100" oninput="recompute()"><input id="m_crit" placeholder="예: 서울" oninput="recompute()"></div>
            <label class="f-label">값을 찾을 범위</label>
            <input id="m_val" placeholder="예: C2:C100" oninput="recompute()">
        `,
        build(){
            const type = v('m_type'), range = v('m_range'), crit = v('m_crit'), val = v('m_val');
            if (!range || !crit || !val) return { f: '조건 범위, 조건값, 값 범위를 모두 입력해주세요', e: '' };
            const fn = type === 'max' ? 'MAXIFS' : 'MINIFS';
            return { f: `=${fn}(${val},${range},"${crit}")`, e: `조건을 만족하는 값들 중 가장 ${type==='max'?'큰':'작은'} 값을 찾아요.` };
        }
    },
    textsearch: {
        label: '특정 텍스트 포함 여부 확인',
        form: `
            <label class="f-label">확인할 셀</label>
            <input id="ts_cell" placeholder="예: A2" oninput="recompute()">
            <label class="f-label">찾을 단어</label>
            <input id="ts_word" placeholder="예: 완료" oninput="recompute()">
        `,
        build(){
            const cell = v('ts_cell'), word = v('ts_word');
            if (!cell || !word) return { f: '확인할 셀과 찾을 단어를 입력해주세요', e: '' };
            return { f: `=IF(ISNUMBER(SEARCH("${word}",${cell})),"포함","미포함")`, e: '셀 안에 지정한 단어가 들어있는지 확인해요.' };
        }
    },
    autonum: {
        label: '자동 일련번호 매기기',
        form: `
            <label class="f-label">머리글(제목) 셀 주소</label>
            <input id="an_header" placeholder="예: $A$1" oninput="recompute()">
            <div class="note">이 수식을 데이터 첫 행에 넣고 아래로 채우면, 중간에 행을 지우거나 추가해도 번호가 안 꼬여요.</div>
        `,
        build(){
            const h = v('an_header');
            if (!h) return { f: '머리글 셀 주소를 입력해주세요', e: '' };
            return { f: `=ROW()-ROW(${h})`, e: '머리글 행 기준으로 몇 번째 행인지 계산해서 순번을 매겨요.' };
        }
    },
    numformat: {
        label: '숫자 서식 변환',
        form: `
            <label class="f-label">종류</label>
            <select id="n_type" onchange="toggleNumForm(); recompute()">
                <option value="comma">천 단위 콤마</option>
                <option value="round">반올림</option>
                <option value="percent">퍼센트로 표시</option>
            </select>
            <div id="n_form"></div>
        `,
        onShow(){ toggleNumForm(); },
        build(){
            const type = v('n_type'), cell = v('n_cell');
            if (!cell) return { f: '셀을 입력해주세요', e: '' };
            if (type === 'comma') return { f: `=TEXT(${cell},"#,##0")`, e: '숫자를 천 단위 콤마가 있는 텍스트로 바꿔요.' };
            if (type === 'percent') return { f: `=TEXT(${cell},"0.0%")`, e: '숫자를 퍼센트 형식으로 표시해요 (0.25 → 25.0%).' };
            const d = v('n_digits') || '0';
            return { f: `=ROUND(${cell},${d})`, e: '지정한 소수 자리까지 반올림해요.' };
        }
    },
    mode: {
        label: '최빈값 찾기 (가장 많이 등장한 값)',
        form: `
            <label class="f-label">범위</label>
            <input id="md_range" placeholder="예: B2:B100" oninput="recompute()">
        `,
        build(){
            const range = v('md_range');
            if (!range) return { f: '범위를 입력해주세요', e: '' };
            const fn = platform === 'excel' ? 'MODE.SNGL' : 'MODE';
            return { f: `=${fn}(${range})`, e: '범위 안에서 가장 자주 등장한 값을 찾아요. (숫자 데이터에만 적용돼요)' };
        }
    },
    tenure: {
        label: '근속/경력 연수 계산',
        form: `
            <label class="f-label">입사일(시작일) 셀</label>
            <input id="tn_start" placeholder="예: B2" oninput="recompute()">
        `,
        build(){
            const s = v('tn_start');
            if (!s) return { f: '입사일 셀을 입력해주세요', e: '' };
            return { f: `=DATEDIF(${s},TODAY(),"y")&"년 "&DATEDIF(${s},TODAY(),"ym")&"개월"`, e: '입사일부터 오늘까지 몇 년 몇 개월인지 계산해요.' };
        }
    }
};

function toggleSumRange(){
    const type = v('s_type');
    const label = document.getElementById('s_sumlabel');
    const sr = document.getElementById('s_sr');
    if (!label) return;
    if (type === 'count') { label.textContent = '(개수 세기는 이 항목이 필요 없어요)'; sr.style.display = 'none'; label.style.opacity = '0.5'; }
    else { label.textContent = '합계/평균 낼 범위'; sr.style.display = ''; label.style.opacity = '1'; }
}
function toggleDateForm(){
    const type = v('d_type');
    const el = document.getElementById('d_form');
    if (type === 'workdays') el.innerHTML = `<label class="f-label">시작일 셀 / 종료일 셀</label><div class="row2"><input id="d_start" placeholder="예: B2" oninput="recompute()"><input id="d_end" placeholder="예: C2" oninput="recompute()"></div>`;
    else if (type === 'age') el.innerHTML = `<label class="f-label">생년월일 셀</label><input id="d_birth" placeholder="예: B2" oninput="recompute()">`;
    else el.innerHTML = `<label class="f-label">목표 날짜 셀</label><input id="d_target" placeholder="예: B2" oninput="recompute()">`;
}
function toggleTextForm(){
    const type = v('t_type');
    const el = document.getElementById('t_form');
    if (type === 'join') el.innerHTML = `<label class="f-label">합칠 셀들 (콤마로 구분)</label><input id="t_cells" placeholder="예: A2, B2, C2" oninput="recompute()"><label class="f-label">구분자</label><input id="t_sep" placeholder="예: 공백 한 칸 또는 -" oninput="recompute()">`;
    else if (type === 'mid') el.innerHTML = `<label class="f-label">셀 / 시작 위치 / 글자 수</label><div class="row3"><input id="t_cell" placeholder="A2" oninput="recompute()"><input id="t_start" placeholder="시작(예:3)" oninput="recompute()"><input id="t_n" placeholder="글자수(예:4)" oninput="recompute()"></div>`;
    else el.innerHTML = `<label class="f-label">셀 / 글자 수</label><div class="row2"><input id="t_cell" placeholder="예: A2" oninput="recompute()"><input id="t_n" placeholder="예: 3" oninput="recompute()"></div>`;
}
function toggleNumForm(){
    const type = v('n_type');
    const el = document.getElementById('n_form');
    if (type === 'round') el.innerHTML = `<label class="f-label">셀 / 소수 자리 수</label><div class="row2"><input id="n_cell" placeholder="예: B2" oninput="recompute()"><input id="n_digits" placeholder="예: 2" oninput="recompute()"></div>`;
    else el.innerHTML = `<label class="f-label">셀</label><input id="n_cell" placeholder="예: B2" oninput="recompute()">`;
}

let currentScenario = 'sumif';

function renderScenarioSelect(){
    const sel = document.getElementById('scenario-select');
    sel.innerHTML = Object.keys(SCENARIOS).map(id => `<option value="${id}">${esc(SCENARIOS[id].label)}</option>`).join('');
    sel.value = currentScenario;
}
function renderScenarioForm(){
    const sc = SCENARIOS[currentScenario];
    document.getElementById('scenario-form').innerHTML = sc.form;
    if (sc.onShow) sc.onShow();
    recompute();
}
function recompute(){
    const sc = SCENARIOS[currentScenario];
    const result = sc.build();
    setFormula(result.f || '입력값을 채워주세요', result.e);
}

document.getElementById('scenario-select').addEventListener('change', e => {
    currentScenario = e.target.value;
    renderScenarioForm();
});
document.getElementById('copy-btn').addEventListener('click', async () => {
    const text = document.getElementById('formula-out').textContent;
    try { await navigator.clipboard.writeText(text); toast('복사했어요!'); }
    catch(e) {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); toast('복사했어요!'); } catch(e2) { toast('복사 실패'); }
        document.body.removeChild(ta);
    }
});

function renderPlatformSwitch(){
    document.getElementById('platform-switch').innerHTML = `
        <button class="plat-btn ${platform==='excel'?'active':''}" data-p="excel">엑셀</button>
        <button class="plat-btn ${platform==='sheets'?'active':''}" data-p="sheets">구글 시트</button>
    `;
}
document.getElementById('platform-switch').addEventListener('click', e => {
    const btn = e.target.closest('.plat-btn');
    if (!btn) return;
    platform = btn.dataset.p;
    renderPlatformSwitch();
    recompute();
});

// ---- 스크린샷 붙여넣기 (분석 없음, 그냥 표시만) ----
const pasteZone = document.getElementById('paste-zone');
pasteZone.addEventListener('paste', e => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items) {
        if (item.type.indexOf('image') !== -1) {
            const file = item.getAsFile();
            const reader = new FileReader();
            reader.onload = ev => {
                pasteZone.classList.add('has-img');
                pasteZone.innerHTML = `<button class="clear-img-btn" id="clear-img-btn">지우기</button><img src="${ev.target.result}">`;
                document.getElementById('clear-img-btn').addEventListener('click', ev2 => {
                    ev2.stopPropagation();
                    resetPasteZone();
                });
            };
            reader.readAsDataURL(file);
            e.preventDefault();
            break;
        }
    }
});
function resetPasteZone(){
    pasteZone.classList.remove('has-img');
    pasteZone.innerHTML = `
        <div class="pz-icon">🖼️</div>
        <div class="pz-hint">여기를 클릭하고 Ctrl+V로 붙여넣기</div>
        <div class="pz-note">이 이미지는 분석되지 않아요. 옆에서 셀 위치 확인하는 용도예요.</div>
    `;
}

renderPlatformSwitch();
renderScenarioSelect();
renderScenarioForm();
</script>
</body>
</html>
