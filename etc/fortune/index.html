<style>
    .wrap{ max-width:640px; margin:0 auto; padding:0 20px 100px; }
    .tool-header{ max-width:640px; margin:0 auto; padding:56px 20px 24px; text-align:center; }
    .tool-header .eyebrow{ font-size:11px; letter-spacing:0.18em; color:var(--gold); margin-bottom:14px; }
    .tool-header h1{ font-size:clamp(24px,5vw,34px); font-weight:900; margin:0 0 10px; }
    .tool-header p{ color:var(--muted); font-size:13.5px; max-width:440px; margin:0 auto; }

    .lang-switch{ display:flex; gap:6px; justify-content:center; margin-bottom:14px; }
    .lang-btn{
        background:var(--surface); border:1px solid var(--border); color:var(--muted);
        border-radius:16px; padding:5px 14px; font-size:11.5px; cursor:pointer; font-family:inherit;
        transition:border-color .15s ease, color .15s ease, background .15s ease;

    .lang-btn.active{ border-color:var(--border-lit); color:var(--gold); background:rgba(232,185,63,0.1); }

    .date-badge{ text-align:center; font-size:11.5px; color:var(--muted); margin-bottom:20px; }

    .cat-tabs{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:24px; }
    .cat-tab{
        background:var(--surface); border:1px solid var(--border); color:var(--muted);
        border-radius:20px; padding:8px 16px; font-size:12.5px; cursor:pointer; font-family:inherit;
        transition:border-color .15s ease, color .15s ease, background .15s ease;
    }
    .cat-tab:hover{ color:var(--text); }
    .cat-tab.active{ border-color:var(--border-lit); color:var(--gold); background:rgba(232,185,63,0.1); }

    .panel{
        background:linear-gradient(180deg, var(--surface2), var(--surface));
        border:1px solid var(--border); border-radius:14px; padding:32px 24px; text-align:center;
        min-height:320px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    }
    .panel .cat-title{ font-size:16px; font-weight:700; color:var(--gold); margin-bottom:6px; }
    .panel .cat-hint{ font-size:12px; color:var(--muted); margin-bottom:26px; }

    .card-row{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .tarot-card{ width:84px; height:136px; perspective:800px; cursor:pointer; }
    .tarot-card.disabled{ pointer-events:none; }
    .tarot-card.disabled:not(.flipped){ opacity:0.35; }
    .card-inner{
        position:relative; width:100%; height:100%; transition:transform .65s cubic-bezier(.3,.7,.3,1);
        transform-style:preserve-3d;
    }
    .tarot-card.flipped .card-inner{ transform:rotateY(180deg); }
    .card-back, .card-front{
        position:absolute; inset:0; backface-visibility:hidden; border-radius:10px;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        border:2px solid var(--gold); box-sizing:border-box;
    }
    .card-back{
        background:
            repeating-linear-gradient(45deg, rgba(232,185,63,0.05) 0 8px, transparent 8px 16px),
            linear-gradient(160deg, var(--surface2), var(--bg));
    }
    .card-back::before{
        content:''; position:absolute; inset:6px; border:1px solid rgba(232,185,63,0.5); border-radius:6px;
    }
    .card-back svg{ width:34px; height:34px; opacity:0.85; }
    .card-front{
        background:radial-gradient(circle at 50% 28%, rgba(232,185,63,0.22), var(--surface2));
        transform:rotateY(180deg); padding:10px 8px;
    }
    .card-front::before{
        content:''; position:absolute; inset:5px; border:1px solid rgba(232,185,63,0.4); border-radius:6px;
    }
    .card-front .cf-icon{ font-size:30px; margin-bottom:8px; }
    .card-front .cf-name{ font-size:8px; line-height:1.5; color:var(--gold); font-family:'Press Start 2P', monospace; }

    .fortune-result{
        margin-top:26px; opacity:0; transform:translateY(6px); transition:opacity .4s ease, transform .4s ease;
        max-width:460px;
    }
    .fortune-result.show{ opacity:1; transform:translateY(0); }
    .fortune-result .fr-name{ font-size:13px; color:var(--gold); font-weight:700; margin-bottom:10px; }
    .fortune-result .fr-text{ font-size:14.5px; line-height:1.8; color:var(--text); }
    .already-note{ font-size:11px; color:var(--muted); margin-top:16px; }
</style>

        { name:'An expression card', text:"If there's something you've wanted to say, today's a good day to find the courage. Holding it in can only weigh on you more. Honest words tend to leave you feeling lighter than expected." },
        { name:'A small change card', text:"It's a good day to step outside your routine, even in a small way. It doesn't need to be a big decision — one different choice can shift your whole mood. Don't be afraid of a little unfamiliarity today." },
        { name:'A self-praise card', text:"Today, don't hold back from giving yourself some credit. Even small wins deserve to be recognized. Practicing gentleness with yourself is what today calls for." },
        { name:'An action card', text:"Today's a good day to finally tackle something you've been putting off. Once you start, it's often less daunting than it seemed. Small actions add up to real relief." },
        { name:'A gentleness card', text:"It's okay not to be too hard on yourself today. Instead of blaming yourself for falling short, recognize the effort you put in. A little more kindness toward yourself is what today needs." },
        { name:'A quiet-effort card', text:"Today's effort leaves a mark somewhere, even if you can't see it right away. Don't assume it's wasted just because results aren't visible yet. Effort that builds up always shows itself eventually." },
        { name:'A follow-your-heart card', text:"Today's a good day to let your heart lead more than your head. Rather than overanalyzing, try trusting your instincts. The answer you need might be waiting wherever your heart points." }
    ]
};
const ITEM_POOL = { ko:['우산','손거울','머그컵','열쇠고리','노트','이어폰','볼펜','스카프','텀블러','손목시계','향초','인형'], en:['an umbrella','a hand mirror','a mug','a keychain','a notebook','earphones','a pen','a scarf','a tumbler','a wristwatch','a candle','a small doll'] };
const COLOR_POOL = { ko:['하늘색','노란색','초록색','보라색','분홍색','하얀색','남색','주황색','민트색','갈색','회색','금색'], en:['sky blue','yellow','green','purple','pink','white','navy','orange','mint','brown','gray','gold'] };

const CATEGORIES = [
    { id:'general', label:{ko:'총운', en:'General'}, icon:'🌟', pool: GENERAL_POOL },
    { id:'love', label:{ko:'애정운', en:'Love'}, icon:'💕', pool: LOVE_POOL },
    { id:'money', label:{ko:'금전운', en:'Money'}, icon:'💰', pool: MONEY_POOL },
    { id:'health', label:{ko:'건강운', en:'Health'}, icon:'🏃', pool: HEALTH_POOL },
    { id:'item', label:{ko:'행운 아이템', en:'Lucky Item'}, icon:'🍀', special:'item' },
    { id:'advice', label:{ko:'오늘의 조언', en:"Today's Advice"}, icon:'💬', pool: ADVICE_POOL }
];

const STORAGE_KEY = 'fortuneDrawnV2';
const SEED_KEY = 'fortuneUserSeed';
const LANG_KEY = 'fortuneLang';

function hashStr(s){
    let h = 0;
    for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) | 0; }
    return Math.abs(h);
}
function todayStr(){
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function todayDisplay(lang){
    const d = new Date();
    if (lang === 'en') {
        const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    }
    return `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}.`;
}
function getUserSeed(){
    let s = localStorage.getItem(SEED_KEY);
    if (!s) { s = Math.random().toString(36).slice(2); localStorage.setItem(SEED_KEY, s); }
    return s;
}
let lang = localStorage.getItem(LANG_KEY) || 'ko';

function getFortune(cat){
    const base = getUserSeed() + todayStr() + cat.id;
    if (cat.special === 'item') {
        const item = ITEM_POOL[lang][hashStr(base + 'i') % ITEM_POOL[lang].length];
        const color = COLOR_POOL[lang][hashStr(base + 'c') % COLOR_POOL[lang].length];
        const number = (hashStr(base + 'n') % 9) + 1;
        if (lang === 'en') {
            return { name:'A lucky symbol card', text:`Today's lucky item is ${item}, lucky color is ${color}, and lucky number is ${number}. Try wearing a touch of this color or making a choice related to this number — it may bring good energy your way.` };
        }
        return { name:'행운의 상징 카드', text:`오늘의 행운의 아이템은 ${item}, 행운의 색은 ${color}, 행운의 숫자는 ${number}이에요. 외출할 때 이 색을 살짝 곁들이거나, 그 숫자와 관련된 선택을 해보면 좋은 기운이 따라올 수 있어요.` };
    }
    return cat.pool[lang][hashStr(base) % cat.pool[lang].length];
}

function loadDrawn(){
    try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (raw.date !== todayStr()) return { date: todayStr(), drawn: {} };
        return raw;
    } catch(e) { return { date: todayStr(), drawn: {} }; }
}
function saveDrawn(state){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let drawnState = loadDrawn();
let currentCat = CATEGORIES[0].id;

function renderLangSwitch(){
    document.getElementById('lang-switch').innerHTML = `
        <button class="lang-btn ${lang==='ko'?'active':''}" data-lang="ko">한국어</button>
        <button class="lang-btn ${lang==='en'?'active':''}" data-lang="en">English</button>
    `;
}

function renderStaticText(){
    const t = UI_TEXT[lang];
    document.getElementById('t-eyebrow').textContent = t.eyebrow;
    document.getElementById('t-title').textContent = t.title;
    document.getElementById('t-subtitle').textContent = t.subtitle;
    document.getElementById('date-badge').textContent = `📅 ${todayDisplay(lang)}${t.dateSuffix}`;
    document.documentElement.lang = lang;
}

function renderTabs(){
    document.getElementById('cat-tabs').innerHTML = CATEGORIES.map(c => `
        <button class="cat-tab ${c.id === currentCat ? 'active' : ''}" data-cat="${c.id}">${c.icon} ${c.label[lang]}</button>
    `).join('');
}

function cardFrontHtml(cat, fortune){
    return `<div class="cf-icon">${cat.icon}</div><div class="cf-name">${fortune.name}</div>`;
}

function renderPanel(){
    const t = UI_TEXT[lang];
    const cat = CATEGORIES.find(c => c.id === currentCat);
    document.getElementById('cat-title').textContent = `${cat.icon} ${cat.label[lang]}`;
    const resultEl = document.getElementById('fortune-result');
    const noteEl = document.getElementById('already-note');
    const hintEl = document.getElementById('cat-hint');
    resultEl.classList.remove('show');
    noteEl.textContent = '';

    const already = drawnState.drawn[cat.id];
    const cardRow = document.getElementById('card-row');
    const fortune = getFortune(cat);

    if (already) {
        hintEl.textContent = t.alreadyHint;
        cardRow.innerHTML = `
            <div class="tarot-card flipped disabled">
                <div class="card-inner">
                    <div class="card-back">${BACK_SVG}</div>
                    <div class="card-front">${cardFrontHtml(cat, fortune)}</div>
                </div>
            </div>`;
        document.getElementById('fr-name').textContent = fortune.name;
        document.getElementById('fr-text').textContent = fortune.text;
        resultEl.classList.add('show');
        noteEl.textContent = t.alreadyNote;
    } else {
        hintEl.textContent = t.pickHint;
        cardRow.innerHTML = Array.from({length:5}).map((_, i) => `
            <div class="tarot-card" data-idx="${i}">
                <div class="card-inner">
                    <div class="card-back">${BACK_SVG}</div>
                    <div class="card-front">${cardFrontHtml(cat, fortune)}</div>
                </div>
            </div>
        `).join('');
    }
}

document.getElementById('lang-switch').addEventListener('click', e => {
    const btn = e.target.closest('.lang-btn');
    if (!btn) return;
    lang = btn.dataset.lang;
    localStorage.setItem(LANG_KEY, lang);
    renderLangSwitch();
    renderStaticText();
    renderTabs();
    renderPanel();
});

document.getElementById('cat-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.cat-tab');
    if (!btn) return;
    currentCat = btn.dataset.cat;
    renderTabs();
    renderPanel();
});

document.getElementById('card-row').addEventListener('click', e => {
    const card = e.target.closest('.tarot-card');
    if (!card || card.classList.contains('disabled')) return;
    const cat = CATEGORIES.find(c => c.id === currentCat);
    document.querySelectorAll('.tarot-card').forEach(c => c.classList.add('disabled'));
    card.classList.remove('disabled');
    card.classList.add('flipped');

    drawnState.drawn[cat.id] = true;
    drawnState.date = todayStr();
    saveDrawn(drawnState);

    setTimeout(() => {
        const fortune = getFortune(cat);
        const resultEl = document.getElementById('fortune-result');
        document.getElementById('fr-name').textContent = fortune.name;
        document.getElementById('fr-text').textContent = fortune.text;
        resultEl.classList.add('show');
        document.getElementById('cat-hint').textContent = '';
    }, 600);
});

renderLangSwitch();
renderStaticText();
renderTabs();
renderPanel();
</script>
