<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 운세 · 나의 프로젝트 작업실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/style.css">
<style>
    .wrap{ max-width:640px; margin:0 auto; padding:0 20px 100px; }
    .tool-header{ max-width:640px; margin:0 auto; padding:56px 20px 24px; text-align:center; }
    .tool-header .eyebrow{ font-size:11px; letter-spacing:0.18em; color:var(--gold); margin-bottom:14px; }
    .tool-header h1{ font-size:clamp(24px,5vw,34px); font-weight:900; margin:0 0 10px; }
    .tool-header p{ color:var(--muted); font-size:13.5px; max-width:440px; margin:0 auto; }

    .date-badge{ text-align:center; font-size:11.5px; color:var(--muted); margin-bottom:20px; }

    .cat-tabs{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:24px; }
    .cat-tab{
        background:var(--surface); border:1px solid var(--border); color:var(--muted);
        border-radius:20px; padding:8px 16px; font-size:12.5px; cursor:pointer; font-family:inherit;
        transition:border-color .15s ease, color .15s ease, background .15s ease;
    }
    .cat-tab:hover{ color:var(--text); }
    .cat-tab.active{ border-color:var(--border-lit); color:var(--gold); background:rgba(232,185,63,0.1); }

    .panel{
        background:linear-gradient(180deg, var(--surface2), var(--surface));
        border:1px solid var(--border); border-radius:14px; padding:32px 24px; text-align:center;
        min-height:260px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    }
    .panel .cat-title{ font-size:16px; font-weight:700; color:var(--gold); margin-bottom:6px; }
    .panel .cat-hint{ font-size:12px; color:var(--muted); margin-bottom:26px; }

    .card-row{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .tarot-card{ width:64px; height:100px; perspective:700px; cursor:pointer; }
    .tarot-card.disabled{ pointer-events:none; opacity:0.4; }
    .card-inner{
        position:relative; width:100%; height:100%; transition:transform .6s cubic-bezier(.3,.7,.3,1);
        transform-style:preserve-3d;
    }
    .tarot-card.flipped .card-inner{ transform:rotateY(180deg); }
    .card-back, .card-front{
        position:absolute; inset:0; backface-visibility:hidden; border-radius:10px;
        display:flex; align-items:center; justify-content:center;
    }
    .card-back{
        background:linear-gradient(135deg, var(--surface2), var(--bg));
        border:1px solid var(--border-lit); font-size:22px; color:var(--gold);
    }
    .card-front{
        background:radial-gradient(circle at 50% 30%, rgba(232,185,63,0.18), var(--surface2));
        border:1.5px solid var(--gold); transform:rotateY(180deg); font-size:26px;
    }

    .fortune-result{
        margin-top:24px; font-size:15px; line-height:1.7; color:var(--text);
        max-width:440px; opacity:0; transform:translateY(6px); transition:opacity .4s ease, transform .4s ease;
    }
    .fortune-result.show{ opacity:1; transform:translateY(0); }
    .already-note{ font-size:11px; color:var(--muted); margin-top:14px; }
</style>
</head>
<body>

<nav class="topnav pixel">
    <a href="../../index.html">홈</a>
    <a href="../../games.html">게임</a>
    <a href="../../works.html">작업물</a>
    <a href="../../etc.html" class="active">기타</a>
</nav>

<header class="tool-header">
    <div class="eyebrow pixel">FORTUNE</div>
    <h1>오늘의 운세</h1>
    <p>항목을 고르고, 카드를 한 장 뽑아보세요. 같은 날엔 같은 결과가 유지돼요.</p>
</header>

<div class="wrap">
    <div class="date-badge" id="date-badge"></div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <div class="panel">
        <div class="cat-title" id="cat-title"></div>
        <div class="cat-hint" id="cat-hint">카드를 한 장 골라주세요</div>
        <div class="card-row" id="card-row"></div>
        <div class="fortune-result" id="fortune-result"></div>
        <div class="already-note" id="already-note"></div>
    </div>
</div>

<script>
const GENERAL_POOL = [

    '주변 사람의 도움으로 어려운 일이 쉽게 풀려요.',
    '새로운 시도를 하기에 좋은 타이밍이에요.',
    '오늘 하루는 평온하고 안정적으로 흘러가요.',
    '예상치 못한 곳에서 기회가 찾아와요.',
    '마음먹은 일이 술술 풀리는 날이에요.',
    '조금 느리더라도 확실하게 나아가는 하루예요.',
    '오늘의 선택이 예상보다 훨씬 좋은 결과를 가져와요.'
];
const LOVE_POOL = [
    '오랫동안 못 본 사람에게서 연락이 올 수 있어요.',
    '솔직한 마음을 표현하면 관계가 한 걸음 더 가까워져요.',
    '작은 오해가 있었다면 오늘 풀릴 기회가 생겨요.',
    '다정한 말 한마디가 큰 힘이 되는 하루예요.',
    '새로운 인연의 씨앗이 뿌려질 수 있어요.',
    '상대방의 진심을 오늘따라 더 잘 느낄 수 있어요.',
    '서두르지 않아도 관계는 자연스럽게 깊어져요.',
    '함께 있는 시간이 유독 편안하게 느껴지는 날이에요.',

const MONEY_POOL = [
    '예상 못한 작은 수입이 생길 수 있어요.',
    '계획했던 지출을 아끼면 여유가 생기는 하루예요.',
    '투자보다는 저축이 유리한 흐름이에요.',
    '알뜰한 선택이 나중에 큰 도움이 돼요.',
    '오늘은 충동구매를 조심하는 게 좋아요.',
    '금전적으로 안정된 흐름이 이어져요.',
    '작은 절약이 모여 뿌듯한 결과로 돌아와요.',
    '돈 관련된 결정은 신중하게 내리는 게 좋은 날이에요.',
    '생각지 못한 곳에서 이득을 볼 수 있어요.',
    '오늘은 지갑 사정이 여유로워지는 날이에요.',
    '계획적인 소비가 좋은 결과로 이어져요.',
    '재정 관리에 좋은 아이디어가 떠오르는 하루예요.'
];
const HEALTH_POOL = [
    '가벼운 스트레칭이 하루를 상쾌하게 만들어줘요.',
    '평소보다 컨디션이 좋아지는 걸 느낄 수 있어요.',
    '충분한 수분 섭취가 오늘따라 중요한 날이에요.',
    '무리하지 않으면 몸도 마음도 편안한 하루가 돼요.',
    '잠깐의 산책이 기분전환에 큰 도움이 돼요.',
    '컨디션 관리에 신경 쓰면 좋은 결과가 있어요.',
    '규칙적인 식사가 활력을 더해주는 날이에요.',
    '몸이 보내는 신호에 귀 기울이면 좋은 하루예요.',
    '가벼운 운동이 에너지를 채워주는 날이에요.',
    '충분한 휴식이 컨디션을 회복시켜줘요.',
    '오늘은 평소보다 숙면을 취하기 좋은 날이에요.',
    '작은 습관 하나가 몸 상태를 좋게 만들어요.'
];
const ADVICE_POOL = [
    '오늘은 조급함보다 여유를 가져보세요.',
    '작은 것에도 감사하는 마음을 가져보세요.',
    '완벽하지 않아도 괜찮아요, 시작이 중요해요.',
    '남과 비교하지 말고 오늘의 나에 집중해보세요.',
    '잠깐 멈춰서 숨을 고르는 것도 필요해요.',
    '하고 싶었던 말을 오늘 한번 꺼내보세요.',
    '익숙한 것에서 벗어나 작은 변화를 시도해보세요.',
    '오늘 하루는 나 자신을 칭찬해주세요.',
    '미루던 일을 하나씩 해치워보는 것도 좋아요.',
    '스스로를 너무 다그치지 마세요.',
    '오늘의 노력은 반드시 흔적을 남겨요.',
    '마음이 이끄는 대로 움직여보세요.'
];
const ITEM_POOL = ['우산','손거울','머그컵','열쇠고리','노트','이어폰','볼펜','스카프','텀블러','손목시계','향초','인형'];
const COLOR_POOL = ['하늘색','노란색','초록색','보라색','분홍색','하얀색','남색','주황색','민트색','갈색','회색','금색'];

const CATEGORIES = [
    { id:'general', label:'총운', icon:'🌟', pool: GENERAL_POOL },
    { id:'love', label:'애정운', icon:'💕', pool: LOVE_POOL },
    { id:'money', label:'금전운', icon:'💰', pool: MONEY_POOL },
    { id:'health', label:'건강운', icon:'🏃', pool: HEALTH_POOL },
    { id:'item', label:'행운 아이템', icon:'🍀', special:'item' },
    { id:'advice', label:'오늘의 조언', icon:'💬', pool: ADVICE_POOL }
];

const STORAGE_KEY = 'fortuneDrawnV1';
const SEED_KEY = 'fortuneUserSeed';

function hashStr(s){
    let h = 0;
    for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) | 0; }
    return Math.abs(h);
}
function todayStr(){
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function getUserSeed(){
    let s = localStorage.getItem(SEED_KEY);
    if (!s) { s = Math.random().toString(36).slice(2); localStorage.setItem(SEED_KEY, s); }
    return s;
}
function getFortuneText(cat){
    const base = getUserSeed() + todayStr() + cat.id;
    if (cat.special === 'item') {
        const item = ITEM_POOL[hashStr(base + 'i') % ITEM_POOL.length];
        const color = COLOR_POOL[hashStr(base + 'c') % COLOR_POOL.length];
        const number = (hashStr(base + 'n') % 9) + 1;
        return `행운의 아이템은 ${item}, 행운의 색은 ${color}, 행운의 숫자는 ${number}이에요.`;
    }
    return cat.pool[hashStr(base) % cat.pool.length];
}

function loadDrawn(){
    try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (raw.date !== todayStr()) return { date: todayStr(), drawn: {} };
        return raw;
    } catch(e) { return { date: todayStr(), drawn: {} }; }
}
function saveDrawn(state){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let drawnState = loadDrawn();
let currentCat = CATEGORIES[0].id;

document.getElementById('date-badge').textContent = `📅 ${todayStr().replace(/-/g,'. ')}. 의 운세`;

function renderTabs(){
    document.getElementById('cat-tabs').innerHTML = CATEGORIES.map(c => `
        <button class="cat-tab ${c.id === currentCat ? 'active' : ''}" data-cat="${c.id}">${c.icon} ${c.label}</button>
    `).join('');
}

function renderPanel(){
    const cat = CATEGORIES.find(c => c.id === currentCat);
    document.getElementById('cat-title').textContent = `${cat.icon} ${cat.label}`;
    const resultEl = document.getElementById('fortune-result');
    const noteEl = document.getElementById('already-note');
    const hintEl = document.getElementById('cat-hint');
    resultEl.classList.remove('show');
    resultEl.textContent = '';
    noteEl.textContent = '';

    const already = drawnState.drawn[cat.id];
    const cardRow = document.getElementById('card-row');

    if (already) {
        hintEl.textContent = '오늘 이미 확인한 카드예요';
        cardRow.innerHTML = `
            <div class="tarot-card flipped disabled">
                <div class="card-inner">
                    <div class="card-back">✦</div>
                    <div class="card-front">${cat.icon}</div>
                </div>
            </div>`;
        resultEl.textContent = getFortuneText(cat);
        resultEl.classList.add('show');
        noteEl.textContent = '자정이 지나면 새 카드를 뽑을 수 있어요';
    } else {
        hintEl.textContent = '카드를 한 장 골라주세요';
        cardRow.innerHTML = Array.from({length:5}).map((_, i) => `
            <div class="tarot-card" data-idx="${i}">
                <div class="card-inner">
                    <div class="card-back">✦</div>
                    <div class="card-front">${cat.icon}</div>
                </div>
            </div>
        `).join('');
    }
}

document.getElementById('cat-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.cat-tab');
    if (!btn) return;
    currentCat = btn.dataset.cat;
    renderTabs();
    renderPanel();
});

document.getElementById('card-row').addEventListener('click', e => {
    const card = e.target.closest('.tarot-card');
    if (!card || card.classList.contains('disabled')) return;
    const cat = CATEGORIES.find(c => c.id === currentCat);
    document.querySelectorAll('.tarot-card').forEach(c => c.classList.add('disabled'));
    card.classList.remove('disabled');
    card.classList.add('flipped');

    drawnState.drawn[cat.id] = true;
    drawnState.date = todayStr();
    saveDrawn(drawnState);

    setTimeout(() => {
        const resultEl = document.getElementById('fortune-result');
        resultEl.textContent = getFortuneText(cat);
        resultEl.classList.add('show');
        document.getElementById('cat-hint').textContent = '';
    }, 550);
});

renderTabs();
renderPanel();
</script>
</body>
</html>
