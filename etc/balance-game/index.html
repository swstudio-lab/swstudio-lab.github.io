<style>
    .wrap{ max-width:640px; margin:0 auto; padding:0 20px 100px; }
    .tool-header{ max-width:640px; margin:0 auto; padding:56px 20px 24px; text-align:center; }
    .tool-header .eyebrow{ font-size:11px; letter-spacing:0.18em; color:var(--gold); margin-bottom:14px; }
    .tool-header h1{ font-size:clamp(24px,5vw,34px); font-weight:900; margin:0 0 10px; }
    .tool-header p{ color:var(--muted); font-size:13.5px; max-width:440px; margin:0 auto; }

    .theme-tabs{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:24px; }
    .theme-tab{
        background:var(--surface); border:1px solid var(--border); color:var(--muted);
        border-radius:20px; padding:8px 16px; font-size:12.5px; cursor:pointer; font-family:inherit;
        transition:border-color .15s ease, color .15s ease, background .15s ease;
    }
    .theme-tab:hover{ color:var(--text); }
    .theme-tab.active{ border-color:var(--border-lit); color:var(--gold); background:rgba(232,185,63,0.1); }

    .qnum{ text-align:center; font-size:11px; color:var(--muted); margin-bottom:14px; }

    .panel{
        background:linear-gradient(180deg, var(--surface2), var(--surface));
        border:1px solid var(--border); border-radius:14px; padding:30px 24px; text-align:center;
        min-height:280px; display:flex; flex-direction:column; justify-content:center;
    }
    .vs-title{ font-size:12px; color:var(--gold); letter-spacing:0.1em; margin-bottom:20px; }
    .opt-row{ display:flex; flex-direction:column; gap:12px; }
    .opt-btn{
        position:relative; overflow:hidden; text-align:left; padding:16px 18px;
        background:var(--surface); border:1.5px solid var(--border); border-radius:12px;
        color:var(--text); font-size:14px; font-family:inherit; cursor:pointer; line-height:1.5;
        transition:border-color .15s ease;
    }
    .opt-btn:hover{ border-color:var(--border-lit); }
    .opt-btn .opt-fill{
        position:absolute; inset:0; background:rgba(232,185,63,0.16); width:0%;
        transition:width .5s cubic-bezier(.2,.7,.3,1); z-index:0;
    }
    .opt-btn.mine .opt-fill{ background:rgba(232,185,63,0.28); }
    .opt-btn .opt-text{ position:relative; z-index:1; }
    .opt-btn .opt-pct{ position:relative; z-index:1; float:right; font-weight:900; color:var(--gold); }
    .vs-divider{ font-size:11px; color:var(--muted); margin:2px 0; }
    .vote-total{ font-size:11px; color:var(--muted); margin-top:16px; }

    .nav-row{ display:flex; justify-content:center; gap:10px; margin-top:20px; }
</style>

    <p>말도 안 되는 두 선택지 중 하나만 골라보세요. 다른 사람들이 뭘 골랐는지도 실시간으로 볼 수 있어요.</p>
</header>

<div class="wrap">

    <div class="nav-row">
        <button class="btn" id="prev-btn">← 이전</button>
        <button class="btn" id="random-btn">🔀 랜덤</button>
        <button class="btn primary" id="next-btn">다음 →</button>

</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyB0LRiIpNwdcCkS4Y5Dz4pP9zcLoadO2Xk",
    authDomain: "taskflow-7cb3b.firebaseapp.com",
    projectId: "taskflow-7cb3b",
    storageBucket: "taskflow-7cb3b.firebasestorage.app",
    messagingSenderId: "811223035419",
    appId: "1:811223035419:web:08b972916827147bc2d2be"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const col = db.collection('balanceVotes');

const THEMES = [
    {
        id: 'love', label: '💕 연애', questions: [
            ['전 애인과 단둘이 해외여행 가기', '이성 사람친구와 밤새 술 마시기'],
            ['소개팅 상대가 첫사랑이랑 완전 똑같이 생김', '소개팅 상대가 전 애인이랑 정반대 스타일'],
            ['짝사랑 상대 앞에서 대차게 넘어지기', '짝사랑 상대가 내 흑역사 사진 보게 되기'],
            ['애인이 내 동창회에 따라오기', '나 혼자 커플들 모임에 솔로로 참석하기'],
            ['헤어진 다음날 전 애인 새 애인 생긴 소식 듣기', '내가 새 애인 생긴 걸 전 애인이 알게 되기'],
            ['전 애인한테 다시 만나자고 연락 오기', '지금 애인한테 전 애인이 계속 연락오는 걸 지켜보기'],
            ['평생 모태솔로로 살기', '평생 3개월마다 헤어지기']
        ]
    },
    {
        id: 'friend', label: '🤝 우정', questions: [
            ['친한 친구가 매번 약속에 30분씩 늦기', '친한 친구가 계속 돈 빌려달라고 하기'],
            ['내가 친구 험담한 걸 그 친구가 듣게 되기', '친구들이 나 몰래 하는 험담을 내가 우연히 듣기'],
            ['절친이 내 첫사랑이랑 사귀기', '절친이 이유 없이 잠수타고 연락 끊기'],
            ['친구 결혼식에서 부케 받다가 넘어지기', '친구 결혼식 축가 부르다 음 이탈하기'],
            ['단톡방에서 내 얘기하다가 실수로 나한테 전송', '남이 잘못 보낸 뒷담화를 내가 읽어버리기']
        ]
    },
    {
        id: 'work', label: '💼 직장', questions: [
            ['매일 야근하지만 월급은 그대로', '정시 퇴근하지만 월급 반토막'],
            ['회식 노래방에서 마이크 계속 뺏기기', '회식이 아예 없어지고 매주 주말 출근'],
            ['인터넷 되는 폰만 들고 무인도에서 혼자 살기', '5성급 호텔인데 인터넷 완전 차단된 채 살기'],
            ['상사가 내 아이디어를 자기 것처럼 발표하기', '내가 직접 발표했는데 완전히 망하기'],
            ['출근길에 매일 지하철 놓치기', '출근하자마자 상사한테 불려가기']
        ]
    },
    {
        id: 'power', label: '✨ 초능력', questions: [
            ['하루 한 번, 어디든 순간이동', '하루 한 번, 10분만 시간 되돌리기'],
            ['다른 사람 속마음 다 읽기', '아무도 내 속마음 못 읽게 완벽 차단'],
            ['시속 10km로 평생 하늘 날기', '하루 한 번 랜덤한 장소로 순간이동'],
            ['배고픔은 안 느끼는데 맛도 못 느끼기', '맛은 다 느끼는데 배는 계속 고프기'],
            ['미래를 볼 수 있지만 아무한테도 말 못 함', '과거로 갈 수 있지만 아무것도 못 바꿈']
        ]
    },
    {
        id: 'food', label: '🍔 음식', questions: [
            ['평생 단 음식 못 먹기', '평생 짠 음식 못 먹기'],
            ['치킨에 파인애플 올려 먹기', '짜장면에 케첩 뿌려 먹기'],
            ['좋아하는 음식 매일 먹어서 질리기', '싫어하는 음식 매주 한 번씩 먹기'],
            ['평생 라면 없이 살기', '평생 김치 없이 살기'],
            ['뜨거운 음식이 항상 미지근하게 나오기', '차가운 음식이 항상 살짝 뜨겁게 나오기']
        ]
    },
    {
        id: 'extreme', label: '🔥 극한선택', questions: [
            ['평생 맨발로만 다니기', '평생 신발 없이 양말만 신고 다니기'],
            ['콘서트 앞자리인데 옆사람이 계속 떠들기', '맨뒷자리인데 조용히 감상하기'],
            ['방귀 소리가 항상 엄청 크게 나기', '방귀 냄새가 항상 엄청 심하게 나기'],
            ['평생 노래방에서 음치로 불리기', '평생 사진 찍으면 항상 눈 감기'],
            ['알람을 못 듣고 매번 지각하기', '알람이 5분마다 울려서 계속 잠 설치기']
        ]
    }
];

const VOTED_KEY = 'balanceGameVoted';
function loadVoted(){ try { return JSON.parse(localStorage.getItem(VOTED_KEY) || '{}'); } catch(e) { return {}; } }
function saveVoted(v){ localStorage.setItem(VOTED_KEY, JSON.stringify(v)); }
let votedMap = loadVoted();

let currentThemeIdx = 0;
let currentQIdx = 0;
let unsub = null;

function renderTabs(){
    document.getElementById('theme-tabs').innerHTML = THEMES.map((t, i) => `
        <button class="theme-tab ${i===currentThemeIdx?'active':''}" data-i="${i}">${t.label}</button>
    `).join('');
}

function qId(){
    return `${THEMES[currentThemeIdx].id}-${currentQIdx}`;
}

function renderQuestion(){
    const theme = THEMES[currentThemeIdx];
    const [a, b] = theme.questions[currentQIdx];
    document.getElementById('qnum').textContent = `${theme.label} · ${currentQIdx+1} / ${theme.questions.length}`;

    if (unsub) { unsub(); unsub = null; }
    const id = qId();
    const myVote = votedMap[id];

    function draw(counts){
        const total = (counts.a||0) + (counts.b||0);
        const pctA = total ? Math.round((counts.a||0)/total*100) : 0;
        const pctB = total ? 100 - pctA : 0;
        const showResult = !!myVote;
        document.getElementById('opt-row').innerHTML = `
            <button class="opt-btn ${myVote==='a'?'mine':''}" data-opt="a">
                ${showResult ? `<div class="opt-fill" style="width:${pctA}%"></div>` : ''}
                <span class="opt-text">${escapeHtml(a)}</span>
                ${showResult ? `<span class="opt-pct">${pctA}%</span>` : ''}
            </button>
            <div class="vs-divider">— VS —</div>
            <button class="opt-btn ${myVote==='b'?'mine':''}" data-opt="b">
                ${showResult ? `<div class="opt-fill" style="width:${pctB}%"></div>` : ''}
                <span class="opt-text">${escapeHtml(b)}</span>
                ${showResult ? `<span class="opt-pct">${pctB}%</span>` : ''}
            </button>
        `;
        document.getElementById('vote-total').textContent = showResult ? `총 ${total}명 참여` : '둘 중 하나를 골라보세요';
    }

    draw({a:0,b:0});
    unsub = col.doc(id).onSnapshot(doc => {
        draw(doc.exists ? doc.data() : {a:0,b:0});
    });
}
function escapeHtml(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('opt-row').addEventListener('click', e => {
    const btn = e.target.closest('.opt-btn');
    if (!btn) return;
    const id = qId();
    if (votedMap[id]) return;
    const opt = btn.dataset.opt;
    votedMap[id] = opt;
    saveVoted(votedMap);
    col.doc(id).set({ [opt]: firebase.firestore.FieldValue.increment(1) }, { merge: true });
    renderQuestion();
});

document.getElementById('theme-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.theme-tab');
    if (!btn) return;
    currentThemeIdx = +btn.dataset.i;
    currentQIdx = 0;
    renderTabs();
    renderQuestion();
});

document.getElementById('next-btn').addEventListener('click', () => {
    const total = THEMES[currentThemeIdx].questions.length;
    currentQIdx = (currentQIdx + 1) % total;
    renderQuestion();
});
document.getElementById('prev-btn').addEventListener('click', () => {
    const total = THEMES[currentThemeIdx].questions.length;
    currentQIdx = (currentQIdx - 1 + total) % total;
    renderQuestion();
});
document.getElementById('random-btn').addEventListener('click', () => {
    const total = THEMES[currentThemeIdx].questions.length;
    let next = Math.floor(Math.random() * total);
    if (total > 1 && next === currentQIdx) next = (next + 1) % total;
    currentQIdx = next;
    renderQuestion();
});

renderTabs();
renderQuestion();
</script>
<script src="../../assets/nav.js"></script>
</body>
</html>
