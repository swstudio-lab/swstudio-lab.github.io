<style>
    .qa-wrap{ max-width:680px; margin:0 auto; padding:0 20px 100px; }
    .qa-item{
        background:linear-gradient(180deg, var(--surface2), var(--surface));
        border:1px solid var(--border); border-radius:12px; margin-bottom:12px; overflow:hidden;
    }
    .qa-item.open{ border-color:var(--border-lit); }
    .qa-q{
        display:flex; align-items:center; gap:14px; padding:18px 20px; cursor:pointer;
    }
    .qa-mark{
        flex:0 0 auto; width:26px; height:26px; border-radius:50%;
        background:rgba(232,185,63,0.14); color:var(--gold);
        display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900;
    }
    .qa-q-text{ flex:1; font-size:14.5px; font-weight:700; }
    .qa-chev{
        flex:0 0 auto; color:var(--muted); font-size:12px; transition:transform .2s ease;
    }
    .qa-item.open .qa-chev{ transform:rotate(180deg); color:var(--gold); }
    .qa-a{
        max-height:0; overflow:hidden; transition:max-height .3s ease;
    }
    .qa-a-inner{
        padding:0 20px 20px 60px; font-size:13.5px; color:var(--muted); line-height:1.8;
    }
    .qa-closing{
        text-align:center; max-width:520px; margin:48px auto 0; padding:28px 24px;
        border-top:1px solid var(--border); font-size:13px; color:var(--muted); line-height:1.85;
    }
    .qa-closing b{ color:var(--gold); font-weight:700; }
</style>

<script>
const QA = [
    {
        q: '이 홈페이지는 어떤 곳인가요?',
        a: '제가 직접 기획하고 만든 게임, 업무 도구, AI 프로젝트를 모아둔 개인 프로젝트 공간이에요. 결과물만 모아두는 게 아니라, 누구나 쉽고 재미있게 직접 경험하고 만들어볼 수 있는 공간을 목표로 하고 있어요.'
    },
    {
        q: '왜 이런 걸 만들게 됐나요?',
        a: '일하면서 "이런 기능이 있으면 좋겠다", "이걸 더 쉽게 만들 수는 없을까"라는 생각을 자주 했어요. 그리고 AI를 써보면서, 많은 사람들이 AI를 여전히 어렵게 느낀다는 것도 알게 됐고요. 그래서 복잡한 지식 없이도 직접 만들어보고 눈으로 결과를 확인하면서 자연스럽게 배울 수 있는 공간을 만들고 싶었어요.'
    },
    {
        q: '개발자이신가요?',
        a: '아니에요, 개발을 전공하지도 않았어요. 다만 아이디어를 실제 서비스로 구현하는 걸 좋아해서, AI와 여러 도구를 적극적으로 활용해 기획부터 제작까지 직접 하고 있어요. 어떤 기술을 쓰느냐보다, 사용자에게 어떤 경험을 줄 수 있느냐가 더 중요하다고 생각해요.'
    },
    {
        q: '어떤 프로젝트들을 만드나요?',
        a: '크게 네 가지예요 — 웹에서 즐기는 게임, 실제로 쓸 수 있는 업무 도구, AI를 쉽고 재미있게 써보는 제작 프로젝트, 그리고 이것저것 실험해보는 개인 프로젝트. 앞으로도 계속 늘려갈 예정이에요.'
    },
    {
        q: 'AI를 어떻게 활용하고 있나요?',
        a: 'AI는 "대신 만들어주는 도구"가 아니라, 같이 아이디어를 발전시키는 파트너라고 생각해요. 목적과 구조는 제가 먼저 기획하고, 구현 방법은 AI와 함께 고민하고 다듬어가요.'
    },
    {
        q: '앞으로의 목표는 뭔가요?',
        a: '단순한 포트폴리오로 끝내고 싶지는 않아요. 게임을 즐기고, 도구를 쓰고, AI를 경험하며 누구나 쉽고 재미있게 무언가를 직접 만들어볼 수 있는 공간으로 계속 키워가는 게 목표예요.'
    }
];

const listEl = document.getElementById('qa-list');
listEl.innerHTML = QA.map((item, i) => `
    <div class="qa-item" data-i="${i}">
        <div class="qa-q">
            <div class="qa-mark pixel">Q</div>
            <div class="qa-q-text">${item.q}</div>
            <div class="qa-chev">▾</div>
        </div>
        <div class="qa-a" id="qa-a-${i}">
            <div class="qa-a-inner">${item.a}</div>
        </div>
    </div>
`).join('');

listEl.addEventListener('click', e => {
    const q = e.target.closest('.qa-q');
    if (!q) return;
    const item = q.closest('.qa-item');
    const body = item.querySelector('.qa-a');
    const isOpen = item.classList.contains('open');

    // 다른 것들 닫기
    listEl.querySelectorAll('.qa-item.open').forEach(el => {
        el.classList.remove('open');
        el.querySelector('.qa-a').style.maxHeight = '0px';
    });

    if (!isOpen) {
        item.classList.add('open');
        body.style.maxHeight = body.scrollHeight + 'px';
    }
});

// 첫 번째 항목 기본으로 열어두기
listEl.querySelector('.qa-item .qa-q').click();
</script>
